# docker-compose.yml
# Brings up BOTH databases with one command:  docker compose up -d
# Stops them (data kept) with:                docker compose down
# Wipes them (data destroyed) with:           docker compose down -v

services:
  postgres:
    image: postgres:16                 # official Postgres image — no install needed
    container_name: telecom_postgres
    environment:
      POSTGRES_USER: admin             # the SUPERUSER (we use this only for setup/loading)
      POSTGRES_PASSWORD: admin_pw      # change for anything real; fine for local dev
      POSTGRES_DB: telecom             # a database named "telecom" is created on first boot
    ports:
      - "5433:5432"                    # host:container — your Python connects to localhost:5432
    volumes:
      - pgdata:/var/lib/postgresql/data   # data lives in a named volume -> survives restarts
    healthcheck:                       # lets us know when Postgres is actually ready
      test: ["CMD-SHELL", "pg_isready -U admin -d telecom"]
      interval: 5s
      timeout: 3s
      retries: 5

  mongo:
    image: mongo:7                     # official MongoDB image
    container_name: telecom_mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin_pw
    ports:
      - "27017:27017"                  # your Python connects to localhost:27017
    volumes:
      - mongodata:/data/db             # persistent storage, same idea as Postgres

volumes:                               # declaring the named volumes Docker manages for us
  pgdata:
  mongodata:
